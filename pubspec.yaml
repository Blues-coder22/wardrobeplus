name: wardrobeplus
description: "An AI-powered digital boutique wardrobe layout application built with Flutter."

# The following line prevents the package from being accidentally published to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gives you access to the clean, modern look of iOS/Material system icons
  cupertino_icons: ^1.0.6
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# The core styling and asset registry rules block
flutter:
  # Ensures your application layouts can render Material 3 UI widgets natively
  uses-material-design: true

  # If you decide to add custom outfit images, garment graphics, or icons later,
  # you can uncomment this section by removing the '#' symbols:
  # assets:
  #   - assets/images/
  #   - assets/icons/